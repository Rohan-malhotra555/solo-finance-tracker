
{% extends 'tracker/base.html' %}

{% block content %}
<div class="max-w-lg mx-auto bg-white p-8 rounded-lg shadow border border-gray-200 mt-10">
    
    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Edit Profile</h2>

    <!-- This tells the browser: "Warning. I am attaching a heavy 
    binary payload. Break this data into multiple parts (text parts 
    and file parts) and send them securely." -->
    <form method="POST" enctype="multipart/form-data" class="space-y-4">
        {% csrf_token %}
        
        <div class="text-gray-700 font-medium">
            {{ form.as_p }}
        </div>
        
        <div class="pt-4 flex justify-between items-center">
            <a href="{% url 'dashboard' %}" class="text-gray-500 hover:text-gray-800 font-medium">Cancel</a>
            
            <button type="submit" class="bg-orange-600 hover:bg-orange-700 text-white font-bold py-2 px-6 rounded shadow transition duration-200">
                Save Profile
            </button>
        </div>
    </form>

</div>
{% endblock %}
