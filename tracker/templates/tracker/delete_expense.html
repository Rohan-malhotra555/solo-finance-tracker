{% extends 'tracker/base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow border border-gray-200 mt-10 text-center">
    
    <h2 class="text-2xl font-bold text-red-600 mb-4">Delete Expense?</h2>
    
    <p class="text-gray-700 mb-6">
        Are you sure you want to delete "<strong>{{ target_expense.description }}</strong>"? This action cannot be undone.
    </p>

    <form method="POST">
        {% csrf_token %}
        <div class="flex justify-center space-x-4">
            <a href="{% url 'dashboard' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-6 rounded shadow transition">Cancel</a>
            
            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded shadow transition">Yes, Delete</button>
        </div>
    </form>
    
</div>
{% endblock %}
